<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe</title>
    <style>
        body { font-family: Arial; text-align: center; }
        .board { display: grid; grid-template-columns: repeat(3, 100px); margin: 20px auto; }
        .cell {
            width: 100px; height: 100px;
            font-size: 2.5em; display: flex;
            align-items: center; justify-content: center;
            border: 1px solid #000; cursor: pointer;
        }
        .cell.taken { cursor: not-allowed; color: gray; }
    </style>
</head>
<body>
    <h1>Tic Tac Toe</h1>

    {% if winner %}
        <h2>{{ 'It\'s a tie!' if winner == 'Tie' else winner + ' wins!' }}</h2>
    {% else %}
        <h2>Turn: {{ turn }}</h2>
    {% endif %}

    <div class="board">
        {% for i in range(9) %}
            {% if board[i] %}
                <div class="cell taken">{{ board[i] }}</div>
            {% else %}
                <a href="{{ url_for('move', cell=i) }}"><div class="cell"></div></a>
            {% endif %}
        {% endfor %}
    </div>

    <a href="{{ url_for('reset') }}">🔄 Reset Game</a>
</body>
</html>
